<head>
  <style>
  .g{
  width: 200;
}
#comment1{
  color: white;
}
body{
  background:linear-gradient(#1c1b1f,#2b2a2f);
}
#nnn:active{
  background: yellow;
}
h1{
  color: white;
  background: red;
  padding: 10px;
  margin: 10px;
}
h2{
  background: red;
  border:5px solid #0e20874d ;
  border-left: 10px solid white;
}
#me{
  display: block;
  width: 200px;
  height: 200px;
  margin: 20 auto;
  border-radius: 50%;
  object-fit:cover ;
  padding: 6px;
  background: linear-gradient(green,red,blue);
}
  #btn{
    font-size: 30px;
    padding: 10px;
    background: blue;
    color: white;
    border-radius: 10%;
    width: 150;
    height: 50;
    display: block;
    margin: 50px;
    box-shadow:
    0 0 15px red , 0 0 50px red
    ;
  }
  #btn:active{
    background: yellow;
    transform: scale(0.9);
  }
  body{
    background: #48e98;
  }
  </style>
</head>
<body>
  <img id="me" src="me.png">
  <center>
  <h1>hello to my world</h1>
  </center>
  
  <button id="btn">tea</button>
  <button id="Btn">water</button>
  <button id="BTn">coffee</button>
  <img class="g" id="img1" style="display:none" src="tee.png">
  <img class="g" id="img2" style="display:none" src="water.png">
  <img class="g" id="img3" style="display:none" src="cofe.png">
  <div>
    <h3 id="comment1" style="display:none;color:;">this cup of tea is very fantastic i recommend you to test it<br>
    it cost 5 coins<br>
    if you have any comment or advice write it here👇 <br>
    <input id="put" placeholder="write here"><button id="nnn">send</button>
    </h3>
  </div>
 <script>
   let num = 0
    const comment1 = document.getElementById("comment1")
    const put = document.getElementById("put")
    const send =document.getElementById("nnn")
    const img1=document.getElementById("img1")
    const btn1=document.getElementById("btn")
    const btn2 = document.getElementById("Btn")
    const btn3 = document.getElementById("BTn")
    btn1.addEventListener("click" ,function(){
      num ++
      if (num == 1){
        btn2.style.display="none"
        btn3.style.display="none"
        btn1.innerText="back"
       img1.style.display="block"
       comment1.style.display="block"
      }
      else if(num ==2){
        btn2.style.display="block"
        btn3.style.display="block"
        btn1.innerText="tea"
        img1.style.display="none"
        comment1.style.display="none"
        num=0
      }
    })
    btn2.addEventListener("click",function(){
      num ++
      if (num==1){
        btn1.style.display="none"
        btn3.style.display="none"
        img2.style.display="block"
        btn2.innerText="back"
      }
      else if(num ==2){
        btn1.style.display="block"
        btn3.style.display="block"
        img2.style.display="none"
        num=0 ;
        btn2.innerText="water"
      }
    })
    btn3.addEventListener("click",function(){
      num ++
      if (num==1){
        btn1.style.display="none"
        btn2.style.display="none"
        img3.style.display="block"
        btn3.innerText="back"
      }
      else if(num ==2){
        btn1.style.display="block"
        btn2.style.display="block"
        img3.style.display="none"
        btn3.innerText="coffee"
        num=0 ;}
    })
    send.addEventListener("click",function(){
      let text = put.value;
      console.log("which written is:"+ text);
      put.value="";
    })
 </script>
</body>
